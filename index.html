<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS Cloud Environment Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <header class="header">
      <h1>
        <i class="bi bi-aws aws-icon"></i> AWS Cloud Environment Dashboard
      </h1>
      <nav class="header-nav" id="headerNav">
        <a href="#summary"><i class="bi bi-grid"></i> Summary</a>
        <a href="#accounts"><i class="bi bi-cloud"></i> Accounts</a>
        <a href="#cidrs"><i class="bi bi-hdd"></i> CIDRs</a>
        <a href="#clusters"><i class="bi bi-diagram-3"></i> Clusters</a>
        <a href="#adfs"><i class="bi bi-person-badge"></i> ADFS</a>
        <a href="#tfe"><i class="bi bi-building"></i> TFE</a>
      </nav>
      <button class="burger-menu" id="burgerMenu">
        <i class="bi bi-list"></i>
      </button>
      <button class="filter-menu" id="filterMenu" title="Filters">
        <i class="bi bi-funnel"></i>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
        <i class="bi bi-moon"></i>
      </button>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="filter-section">
        <div class="filter-title"><i class="bi bi-funnel"></i> Filters</div>
      </div>

      <div class="filter-section">
        <div class="filter-title">Application</div>
        <select
          id="filter-application"
          class="filter-select"
          multiple="multiple"
        ></select>
      </div>

      <div class="filter-section">
        <div class="filter-title">Environment</div>
        <select
          id="filter-environment"
          class="filter-select"
          multiple="multiple"
        ></select>
      </div>

      <div class="filter-section">
        <div class="filter-title">Region</div>
        <select
          id="filter-region"
          class="filter-select"
          multiple="multiple"
        ></select>
      </div>

      <div class="filter-section">
        <button class="btn btn-outline-secondary btn-clear" id="clear-filters">
          <i class="bi bi-x-circle"></i> Clear All Filters
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="stats-bar">
        <div class="stat-item">
          <i class="bi bi-cloud text-primary fs-5"></i>
          <div>
            <div class="stat-value" id="stat-accounts">0</div>
            <div class="stat-label">Accounts</div>
          </div>
        </div>
        <div class="stat-item">
          <i class="bi bi-hdd text-success fs-5"></i>
          <div>
            <div class="stat-value" id="stat-cidrs">0</div>
            <div class="stat-label">CIDRs</div>
          </div>
        </div>
        <div class="stat-item">
          <i class="bi bi-diagram-3 text-info fs-5"></i>
          <div>
            <div class="stat-value" id="stat-clusters">0</div>
            <div class="stat-label">Clusters</div>
          </div>
        </div>
        <div class="stat-item">
          <i class="bi bi-person-badge text-warning fs-5"></i>
          <div>
            <div class="stat-value" id="stat-adfs">0</div>
            <div class="stat-label">ADFS Roles</div>
          </div>
        </div>
        <div class="stat-item">
          <i class="bi bi-building text-danger fs-5"></i>
          <div>
            <div class="stat-value" id="stat-tfe">0</div>
            <div class="stat-label">TFE Roles</div>
          </div>
        </div>
      </div>

      <div class="row" id="summary">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <span><i class="bi bi-grid icon"></i> Summary</span>
              <span class="badge bg-secondary rounded-pill" id="summary-count">0</span>
            </div>
            <div class="card-body">
              <table id="table-summary" class="table table-striped" style="width: 100%"></table>
            </div>
          </div>
        </div>
      </div>

      <div class="row" id="accounts">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <span><i class="bi bi-cloud icon"></i> AWS Accounts</span>
              <span class="badge bg-primary rounded-pill" id="account-count"
                >0</span
              >
            </div>
            <div class="card-body">
              <table
                id="table-accounts"
                class="table table-striped"
                style="width: 100%"
              ></table>
            </div>
          </div>
        </div>
      </div>

      <div class="row" id="cidrs">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <span><i class="bi bi-hdd icon"></i> CIDR Allocations</span>
              <span class="badge bg-success rounded-pill" id="cidr-count"
                >0</span
              >
            </div>
            <div class="card-body">
              <table
                id="table-cidr"
                class="table table-striped"
                style="width: 100%"
              ></table>
            </div>
          </div>
        </div>
      </div>

      <div class="row" id="clusters">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <span><i class="bi bi-diagram-3 icon"></i> EKS Clusters</span>
              <span class="badge bg-info rounded-pill" id="cluster-count"
                >0</span
              >
            </div>
            <div class="card-body">
              <table
                id="table-cluster"
                class="table table-striped"
                style="width: 100%"
              ></table>
            </div>
          </div>
        </div>
      </div>

      <div class="row" id="adfs">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <span><i class="bi bi-person-badge icon"></i> ADFS Roles</span>
              <span class="badge bg-warning rounded-pill" id="adfs-count"
                >0</span
              >
            </div>
            <div class="card-body">
              <table
                id="table-adfs"
                class="table table-striped"
                style="width: 100%"
              ></table>
            </div>
          </div>
        </div>
      </div>

      <div class="row" id="tfe">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <span><i class="bi bi-building icon"></i> TFE Roles</span>
              <span class="badge bg-danger rounded-pill" id="tfe-count">0</span>
            </div>
            <div class="card-body">
              <table
                id="table-tfe"
                class="table table-striped"
                style="width: 100%"
              ></table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
